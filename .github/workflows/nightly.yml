name: Nightly rebuild

on:
  schedule:
    # 06:00 UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Refresh live signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run refresh

      - name: Commit refreshed content (if changed)
        run: |
          git config user.name "site-bot"
          git config user.email "site-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain src/data/content.js)" ]; then
            git add src/data/content.js
            git commit -m "chore: nightly refresh of live signals"
            git push
          else
            echo "No changes."
          fi
